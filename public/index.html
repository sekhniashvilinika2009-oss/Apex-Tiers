<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Tiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0e13;
    --panel:#15161d;
    --panel-2:#1c1e27;
    --line:#292b35;
    --text:#f3f1ea;
    --muted:#8b8c98;
    --orange:#ff8c1a;
    --orange-2:#ffb347;
    --gold:#ffcb63;
    --silver:#b8b9c2;
    --bronze:#d98a4e;

    --k-vanilla:#a259ff;
    --k-uhc:#ff5c5c;
    --k-pot:#ff6fae;
    --k-nethop:#7c5cff;
    --k-smp:#43d17a;
    --k-sword:#4ea1ff;
    --k-axe:#2fd7c4;
    --k-mace:#b0b3bd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 600px 300px at 20% -10%, rgba(255,140,26,0.10), transparent 60%),
      radial-gradient(ellipse 500px 250px at 100% 0%, rgba(255,140,26,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 60px;}

  header{margin-bottom:22px;position:relative;}
  .header-top{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
 .brand-mark{
  width:34px;height:34px;border-radius:8px;
  object-fit:cover;
  box-shadow:0 0 18px rgba(255,140,26,0.35);
}
  .brand-name{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:.02em;
  }
  .brand-name .accent{color:var(--orange);}

  .header-actions{display:flex;align-items:center;gap:8px;}
  .info-btn, .discord-btn{
    display:flex;align-items:center;gap:7px;
    background:var(--panel);border:1px solid var(--line);border-radius:9px;
    padding:8px 14px;font-size:13px;font-weight:600;
    color:var(--text);text-decoration:none;cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:border-color .12s ease, color .12s ease;
  }
  .info-btn:hover, .discord-btn:hover{border-color:var(--orange);color:var(--orange-2);}
  .info-btn.active{border-color:var(--orange);color:var(--orange-2);background:rgba(255,140,26,.08);}
  .discord-btn{background:linear-gradient(150deg,var(--orange),#c9560a);border-color:transparent;color:#161616;}
  .discord-btn:hover{color:#161616;filter:brightness(1.08);}

  .info-panel{
    display:none;
    position:absolute;top:calc(100% + 10px);right:0;
    width:340px;max-width:90vw;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 12px 32px rgba(0,0,0,.45);
    padding:14px;z-index:20;
  }
  .info-panel.open{display:block;}
  .info-tabs{display:flex;gap:6px;margin-bottom:12px;background:var(--panel-2);border-radius:8px;padding:3px;}
  .info-tab{
    flex:1;background:transparent;border:none;color:var(--muted);
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:.02em;
    padding:7px 0;border-radius:6px;cursor:pointer;
  }
  .info-tab.active{background:linear-gradient(150deg,var(--orange),#c9560a);color:#161616;}
  .info-hint{color:var(--muted);font-size:11.5px;margin-bottom:10px;line-height:1.5;}

  .title-row{
    display:flex;align-items:center;gap:10px;
    padding:7px 4px;border-bottom:1px solid var(--line);
  }
  .title-row:last-child{border-bottom:none;}
  .title-row .t-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;}
  .title-row .t-req{font-size:11px;color:var(--muted);margin-left:auto;}

  .points-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .points-cell{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-2);border:1px solid var(--line);border-radius:7px;
    padding:6px 10px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;
  }
  .points-cell .p-val{color:var(--orange-2);}

  nav.tabs{
    display:flex;gap:6px;overflow-x:auto;
    padding-bottom:8px;margin-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    flex:none;
    background:transparent;border:none;
    color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14.5px;
    letter-spacing:.02em;
    padding:9px 14px;border-radius:8px 8px 0 0;
    cursor:pointer;
    border-bottom:2px solid transparent;
    display:flex;align-items:center;gap:6px;
    white-space:nowrap;
  }
  nav.tabs button .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.7;}
  nav.tabs button.active{color:var(--orange-2);border-bottom-color:var(--orange);}
  nav.tabs button:hover{color:var(--text);}
  nav.tabs button .tab-icon{
  width:15px;
  height:15px;
  object-fit:contain;
}
  .statusbar{
    display:flex;align-items:center;justify-content:space-between;
    color:var(--muted);font-size:12.5px;margin-bottom:14px;flex-wrap:wrap;gap:8px;
  }
  .statusbar .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px;}
  .statusbar .dot.ok{background:#43d17a;box-shadow:0 0 6px #43d17a;}
  .statusbar button{
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:7px;padding:6px 12px;font-size:12.5px;cursor:pointer;
  }
  .statusbar button:hover{border-color:var(--orange);}

  .list-head{
    display:grid;grid-template-columns:52px 1fr 70px auto;
    gap:12px;padding:8px 16px;
    color:var(--muted);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;
  }

  .row{
    display:grid;grid-template-columns:52px 1fr 70px auto;
    align-items:center;gap:12px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:10px 16px;margin-bottom:8px;
  }
  .row.rank-1{border-color:rgba(255,203,99,.5);background:linear-gradient(90deg,rgba(255,140,26,.10),var(--panel) 40%);}
  .row.rank-2{border-color:rgba(184,185,194,.4);}
  .row.rank-3{border-color:rgba(217,138,78,.4);}

  .rank{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:19px;
    color:var(--muted);
  }
  .rank-1 .rank{color:var(--gold);}
  .rank-2 .rank{color:var(--silver);}
  .rank-3 .rank{color:var(--bronze);}

  .player{display:flex;align-items:center;gap:12px;min-width:0;}
  .player img{width:36px;height:36px;border-radius:7px;flex:none;image-rendering:pixelated;background:var(--panel-2);}
  .player-meta{min-width:0;}
  .player-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16.5px;line-height:1.2;}
  .player-title{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .player-title .pts{color:var(--orange-2);}
  .title-icon{width:13px;height:13px;flex:none;display:inline-flex;}
  .title-icon svg{width:100%;height:100%;}

  .region{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11.5px;
    color:var(--text);background:var(--panel-2);border:1px solid var(--line);
    border-radius:6px;padding:4px 8px;text-align:center;width:fit-content;
  }

  .tierset{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .tierbadge{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    width:44px;
  }
  .tierbadge .icon{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.15);
}
.tierbadge .icon img{
  width:100%;
  height:100%;
  object-fit:cover;
  padding:4px; /* SVGs from mctiers often look better with a little breathing room */
}
  .tierbadge .code{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10.5px;
    letter-spacing:.02em;
  }
  .tierbadge.empty .icon{background:var(--panel-2);color:var(--line);border-style:dashed;}
  .tierbadge.empty .code{color:var(--line);}

  .single-tier{
    display:flex;align-items:center;gap:8px;justify-self:end;
  }
  .single-tier .code{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;}

  .empty-state{
    text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;
  }
.tier-columns{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  align-items:start;
}
.tier-col{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}
.tier-col-head{
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:16px;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
}
.tier-col-head.t1{background:linear-gradient(135deg,rgba(255,203,99,.18),transparent);color:var(--gold);}
.tier-col-head.t2{background:linear-gradient(135deg,rgba(184,185,194,.16),transparent);color:var(--silver);}
.tier-col-head.t3{background:linear-gradient(135deg,rgba(255,140,26,.18),transparent);color:var(--orange-2);}
.tier-col-head.t4{background:linear-gradient(135deg,rgba(126,140,255,.14),transparent);color:#9aa3d6;}
.tier-col-head.t5{background:linear-gradient(135deg,rgba(139,140,152,.12),transparent);color:var(--muted);}

.tier-col-body{padding:4px 0;}
.tier-player{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;font-size:14px;font-weight:600;
}
.tier-player img{
  width:24px;height:24px;border-radius:5px;
  image-rendering:pixelated;flex:none;background:var(--panel-2);
}
.tier-player.ht{ color:#ffffff; }
.tier-player.lt{ color:var(--muted); }
.tier-empty{ padding:14px;color:var(--muted);font-size:12.5px;text-align:center; }
.modal-overlay{
  display:none;
  position:fixed; inset:0; z-index:100;
  background:rgba(8,9,12,.72);
  align-items:center; justify-content:center;
  padding:20px;
}
.modal-overlay.open{ display:flex; }
.modal-card{
  position:relative;
  width:420px; max-width:100%;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:28px 24px 24px;
  text-align:center;
}
.modal-close{
  position:absolute; top:14px; right:14px;
  width:30px; height:30px; border-radius:50%;
  background:var(--panel-2); border:1px solid var(--line);
  color:var(--text); cursor:pointer; font-size:14px;
}
.modal-close:hover{ border-color:var(--orange); color:var(--orange-2); }

.modal-avatar-wrap{
  width:84px; height:84px; margin:0 auto 12px;
  border-radius:50%; border:2px solid var(--orange);
  overflow:hidden; box-shadow:0 0 20px rgba(255,140,26,.3);
}
.modal-avatar-wrap img{ width:100%; height:100%; object-fit:cover; }

.modal-name{
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:24px;
  margin-bottom:8px;
}
.modal-title-badge{
  display:inline-block;
  background:var(--panel-2); border:1px solid var(--line);
  color:var(--orange-2);
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px;
  padding:6px 14px; border-radius:20px; margin-bottom:10px;
}
.modal-region{ color:var(--muted); font-size:13px; margin-bottom:18px; }

.modal-section-label{
  text-align:left; color:var(--muted); font-size:11px;
  letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; margin-top:16px;
}
.modal-position{
  display:flex; align-items:center; gap:10px;
  background:var(--panel-2); border:1px solid var(--line);
  border-radius:9px; padding:12px 14px;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px;
  text-align:left;
}
.modal-position .rank-num{
  background:var(--orange); color:#161616;
  border-radius:6px; padding:3px 9px; font-size:14px;
}
.modal-position .pos-pts{ margin-left:auto; color:var(--orange-2); }

.modal-tiers{
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
}
.modal-tier-cell{
  display:flex; flex-direction:column; align-items:center; gap:4px;
  background:var(--panel-2); border:1px solid var(--line);
  border-radius:9px; padding:10px 4px;
}
.modal-tier-cell img{ width:24px; height:24px; }
.modal-tier-cell .code{ font-family:'Rajdhani',sans-serif; font-weight:700; font-size:12.5px; }
.modal-tier-cell.empty{ opacity:.35; }
  .search-bar{
  display:flex; gap:8px; margin-bottom:16px;
}
.search-bar input{
  flex:1;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:9px;
  padding:10px 14px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:14px;
  outline:none;
}
.search-bar input:focus{ border-color:var(--orange); }
.search-bar input::placeholder{ color:var(--muted); }
.search-bar button{
  background:var(--panel); border:1px solid var(--line);
  color:var(--text); border-radius:9px; padding:0 16px;
  cursor:pointer; font-size:15px;
}
.search-bar button:hover{ border-color:var(--orange); }
.search-error{
  color:#ff6b6b; font-size:12.5px; margin:-8px 0 12px 2px; display:none;
}
.search-error.show{ display:block; }
@media (max-width:900px){
  .tier-columns{grid-template-columns:1fr 1fr;}
}
@media (max-width:640px){
  .tier-columns{grid-template-columns:1fr;}
}
  @media (max-width:640px){
    .list-head{display:none;}
    .row{grid-template-columns:36px 1fr;grid-template-rows:auto auto;row-gap:8px;}
    .region{display:none;}
    .tierset{grid-column:1 / -1;justify-content:flex-start;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-top">
      <div class="brand">
  <img src="https://media.discordapp.net/attachments/1426897196313481363/1524335898936868964/Gemini_Generated_Image_3o1att3o1att3o1a.png?ex=6a4f5fef&is=6a4e0e6f&hm=6903616b4bb7e6bebde1d0270ed0d3a70d2e3731c923ad917a6fd7017bc72d32&=&format=webp&quality=lossless&width=873&height=873" alt="Apex Tiers" class="brand-mark">
  <div class="brand-name">APEX <span class="accent">TIERS</span></div>

        <button class="info-btn" id="infoBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1.2" fill="currentColor"/></svg>
          Information
        </button>
        <a class="discord-btn" href="https://discord.gg/62ZFYfXTk" target="_blank" rel="noopener">
          <svg width="17" height="17" viewBox="0 0 127.14 96.36"><path fill="currentColor" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>

    <div class="info-panel" id="infoPanel">

      <div class="search-bar">

  <button id="searchBtn">🔍</button>
</div>
      <div class="search-error" id="searchError">მოთამაშე ვერ მოიძებნა</div>
      <div class="info-body" id="infoBodyTitles">
        <div class="info-hint">ტიტული განისაზღვრება მთლიანი ქულების მიხედვით</div>
        <div id="titlesList"></div>
      </div>
      <div class="info-body" id="infoBodyPoints" style="display:none;">
        <div class="info-hint">თითოეული ტიერი შემდეგ ქულას იძლევა</div>
        <div id="pointsList" class="points-grid"></div>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="statusbar">
    <div><span class="dot" id="statusDot"></span><span id="statusText">იტვირთება...</span></div>
    <button id="refreshBtn">↻ განახლება</button>
  </div>

  <div class="list-head" id="listHead">
    <div>#</div><div>PLAYER</div><div>REGION</div><div style="text-align:right;">TIERS</div>

  <div class="modal-overlay" id="playerModal">
  <div class="modal-card">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-avatar-wrap">
      <img id="modalAvatar" src="" alt="">
    </div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-title-badge" id="modalTitle"></div>
    <div class="modal-region" id="modalRegion"></div>

    <div class="modal-section-label">POSITION</div>
    <div class="modal-position" id="modalPosition"></div>

    <div class="modal-section-label">TIERS</div>
    <div class="modal-tiers" id="modalTiers"></div>
  </div>

<script>
  const API_BASE = '';
  const TIER_ORDER = ['HT1','LT1','HT2','LT2','HT3','LT3','HT4','LT4','HT5','LT5'];
  const KIT_COLORS = {
    vanilla:'var(--k-vanilla)', uhc:'var(--k-uhc)', pot:'var(--k-pot)', nethop:'var(--k-nethop)',
    smp:'var(--k-smp)', sword:'var(--k-sword)', axe:'var(--k-axe)', mace:'var(--k-mace)'
  };
 const KIT_ICONS = {
  vanilla:'https://mctiers.com/tier_icons/vanilla.svg',
  uhc:'https://mctiers.com/tier_icons/uhc.svg',
  pot:'https://mctiers.com/tier_icons/pot.svg',
  nethop:'https://mctiers.com/tier_icons/nethop.svg',
  smp:'https://mctiers.com/tier_icons/smp.svg',
  sword:'https://mctiers.com/tier_icons/sword.svg',
  axe:'https://mctiers.com/tier_icons/axe.svg',
  mace:'https://mctiers.com/tier_icons/mace.svg'
};

  let KITS = [];
  let PLAYERS = [];
  let TITLES_DATA = [];
  let TIER_POINTS = {};
  let activeTab = 'overall';
  let pollTimer = null;

  const tabsEl = document.getElementById('tabs');
  const boardEl = document.getElementById('board');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const listHead = document.getElementById('listHead');

  function tierColor(tier){
    const idx = TIER_ORDER.indexOf(tier);
    if(idx === -1) return 'var(--muted)';
    const t = idx / (TIER_ORDER.length - 1);
    const from = [255,140,26], to = [139,140,152];
    const c = from.map((v,i)=> Math.round(v + (to[i]-v)*t));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }

  function titleColor(idx, total){
    const t = total <= 1 ? 0 : idx / (total - 1);
    const from = [255,203,99], to = [139,140,152];
    const c = from.map((v,i)=> Math.round(v + (to[i]-v)*t));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }

  function titleIconSVG(iconKey){
    const total = TITLES_DATA.length || 7;
    let idx = TITLES_DATA.findIndex(t => t.icon === iconKey);
    if(idx === -1) idx = total - 1;
    const color = titleColor(idx, total);
    const filled = idx <= Math.floor((total - 1) / 2);
    const glow = idx === 0;
    return `<svg viewBox="0 0 24 24">
      ${glow ? `<polygon points="12,1 23,12 12,23 1,12" fill="none" stroke="${color}" stroke-width="1" opacity="0.45"/>` : ''}
      <polygon points="12,3.5 20.5,12 12,20.5 3.5,12" fill="${filled ? color : 'none'}" fill-opacity="${filled ? 0.9 : 0}" stroke="${color}" stroke-width="2"/>
    </svg>`;
  }

  function renderTabs(){
  tabsEl.innerHTML = '';
  const mk = (key,label) => {
    const b = document.createElement('button');
    b.innerHTML = (key!=='overall' ? `<img src="${KIT_ICONS[key]}" alt="${key}" class="tab-icon">` : '') + label;
    if(key === activeTab) b.classList.add('active');
    b.onclick = () => { activeTab = key; render(); };
    tabsEl.appendChild(b);
  };
  mk('overall','OVERALL');
  KITS.forEach(k => mk(k.key, k.label.toUpperCase()));
}

  function avatarUrl(ign){
    return `https://mc-heads.net/avatar/${encodeURIComponent(ign)}/64`;
  }

  function renderOverallRow(p, rank){
    const row = document.createElement('div');
    row.className = 'row rank-' + rank;
    row.innerHTML = `
      <div class="rank">${rank}</div>
      <div class="player">
        <img src="${avatarUrl(p.ign)}" alt="${p.ign}" loading="lazy">
        <div class="player-meta">
          <div class="player-name">${p.ign}</div>
          <div class="player-title"><span class="title-icon">${titleIconSVG(p.titleIcon)}</span>${p.title} · <span class="pts">${p.points} points</span></div>
        </div>
      </div>
      <div class="region">${p.region || '—'}</div>
      <div class="tierset">
        ${KITS.map(k => {
  const t = p.tiers[k.key];
  if(!t) return `<div class="tierbadge empty"><div class="icon"><img src="${KIT_ICONS[k.key]}" alt="${k.key}"></div><div class="code">—</div></div>`;
  return `<div class="tierbadge">
    <div class="icon"><img src="${KIT_ICONS[k.key]}" alt="${k.key}"></div>
    <div class="code" style="color:${tierColor(t)}">${t}</div>
  </div>`;
}).join('')}
      </div>
    `;
     row.style.cursor = 'pointer';
    row.onclick = () => openPlayerModal(p.ign);
    return row;
  }

 function renderKitColumns(kitKey){
  const wrap = document.createElement('div');
  wrap.className = 'tier-columns';

  for(let tierNum = 1; tierNum <= 5; tierNum++){
    const col = document.createElement('div');
    col.className = 'tier-col';

    const head = document.createElement('div');
    head.className = 'tier-col-head t' + tierNum;
    head.textContent = 'Tier ' + tierNum;
    col.appendChild(head);

    const body = document.createElement('div');
    body.className = 'tier-col-body';

    const players = PLAYERS.filter(p => {
      const t = p.tiers[kitKey];
      return t === 'HT' + tierNum || t === 'LT' + tierNum;
    }).sort((a,b) => {
      const aHT = a.tiers[kitKey].startsWith('HT') ? 0 : 1;
      const bHT = b.tiers[kitKey].startsWith('HT') ? 0 : 1;
      return aHT - bHT;
    });

    if(!players.length){
      body.innerHTML = '<div class="tier-empty">—</div>';
    } else {
      players.forEach(p => {
        const isHT = p.tiers[kitKey].startsWith('HT');
        const row = document.createElement('div');
        row.className = 'tier-player ' + (isHT ? 'ht' : 'lt');
        row.innerHTML = `<img src="${avatarUrl(p.ign)}" alt="${p.ign}" loading="lazy">${p.ign}`;
        row.style.cursor = 'pointer';
        row.onclick = () => openPlayerModal(p.ign);
        body.appendChild(row);
      });
    }

    col.appendChild(body);
    wrap.appendChild(col);
  }

  boardEl.appendChild(wrap);
} 
  const playerModal = document.getElementById('playerModal');
document.getElementById('modalClose').onclick = () => playerModal.classList.remove('open');
playerModal.onclick = (e) => { if(e.target === playerModal) playerModal.classList.remove('open'); };

function openPlayerModal(ign){
  const p = PLAYERS.find(pl => pl.ign.toLowerCase() === ign.toLowerCase());
  if(!p) return;

  const rank = PLAYERS.findIndex(pl => pl.ign.toLowerCase() === ign.toLowerCase()) + 1;

  document.getElementById('modalAvatar').src = avatarUrl(p.ign);
  document.getElementById('modalName').textContent = p.ign;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalRegion').textContent = p.region || '—';

  document.getElementById('modalPosition').innerHTML = `
    <span class="rank-num">${rank}.</span>
    <span>OVERALL</span>
    <span class="pos-pts">${p.points} points</span>
  `;

  const tiersEl = document.getElementById('modalTiers');
  tiersEl.innerHTML = KITS.map(k => {
    const t = p.tiers[k.key];
    if(!t) return `<div class="modal-tier-cell empty"><img src="${KIT_ICONS[k.key]}" alt="${k.key}"><span class="code">—</span></div>`;
    return `<div class="modal-tier-cell"><img src="${KIT_ICONS[k.key]}" alt="${k.key}"><span class="code" style="color:${tierColor(t)}">${t}</span></div>`;
  }).join('');

  playerModal.classList.add('open');
}
  function render(){
    renderTabs();
    boardEl.innerHTML = '';

    if(activeTab === 'overall'){
      listHead.style.display = 'grid';
      listHead.children[3].textContent = 'TIERS';
      if(!PLAYERS.length){
        boardEl.innerHTML = '<div class="empty-state">ჯერ არცერთი შედეგი არ არის შეყვანილი.</div>';
        return;
      }
      PLAYERS.forEach((p, i) => boardEl.appendChild(renderOverallRow(p, i+1)));
    } else {
  listHead.style.display = 'none';
  const anyPlayers = PLAYERS.some(p => p.tiers[activeTab]);
  if(!anyPlayers){
    boardEl.innerHTML = '<div class="empty-state">ამ კითისთვის ჯერ არცერთი შედეგი არ არის.</div>';
    return;
  }
  renderKitColumns(activeTab);
}
  }
const playerSearch = document.getElementById('playerSearch');
const searchBtn = document.getElementById('searchBtn');
const searchError = document.getElementById('searchError');

function doSearch(){
  const query = playerSearch.value.trim().toLowerCase();
  if(!query) return;
  const match = PLAYERS.find(p => p.ign.toLowerCase() === query);
  if(match){
    searchError.classList.remove('show');
    openPlayerModal(match.ign);
    playerSearch.value = '';
  } else {
    searchError.classList.add('show');
  }
}

searchBtn.onclick = doSearch;
playerSearch.onkeydown = (e) => {
  if(e.key === 'Enter') doSearch();
};
playerSearch.oninput = () => searchError.classList.remove('show');
  function renderInfoPanel(){
    const titlesList = document.getElementById('titlesList');
    titlesList.innerHTML = TITLES_DATA.map(t => `
      <div class="title-row">
        <span class="title-icon" style="width:16px;height:16px;">${titleIconSVG(t.icon)}</span>
        <span class="t-name">${t.name}</span>
        <span class="t-req">${t.min > 0 ? t.min + '+ ქულა' : '< ' + (TITLES_DATA[TITLES_DATA.length-2] ? TITLES_DATA[TITLES_DATA.length-2].min : 10) + ' ქულა'}</span>
      </div>
    `).join('');

    const pointsList = document.getElementById('pointsList');
    pointsList.innerHTML = TIER_ORDER.map(t => `
      <div class="points-cell"><span>${t}</span><span class="p-val">${TIER_POINTS[t] ?? 0}</span></div>
    `).join('');
  }

  const infoBtn = document.getElementById('infoBtn');
  const infoPanel = document.getElementById('infoPanel');
  infoBtn.onclick = () => {
    infoPanel.classList.toggle('open');
    infoBtn.classList.toggle('active');
  };
  document.addEventListener('click', (e) => {
    if(!infoPanel.contains(e.target) && !infoBtn.contains(e.target)){
      infoPanel.classList.remove('open');
      infoBtn.classList.remove('active');
    }
  });
  document.querySelectorAll('.info-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.info-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const isTitles = tab.dataset.tab === 'titles';
      document.getElementById('infoBodyTitles').style.display = isTitles ? '' : 'none';
      document.getElementById('infoBodyPoints').style.display = isTitles ? 'none' : '';
    };
  });

  async function load(){
    statusDot.className = 'dot';
    statusText.textContent = 'იტვირთება...';
    try{
      const res = await fetch(API_BASE + '/api/players', { cache: 'no-store' });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      KITS = data.kits;
      PLAYERS = data.players;
      TITLES_DATA = data.titles || TITLES_DATA;
      TIER_POINTS = data.tierPoints || TIER_POINTS;
      render();
      renderInfoPanel();
      statusDot.className = 'dot ok';
      statusText.textContent = 'განახლდა ' + new Date().toLocaleTimeString('ka-GE');
    } catch(e){
      statusDot.className = 'dot';
      statusText.textContent = 'API-სთან დაკავშირება ვერ მოხერხდა — შეამოწმე რომ სერვერი გაშვებულია';
    }
  }

  document.getElementById('refreshBtn').onclick = load;

  load();
  pollTimer = setInterval(load, 15000);
</script>
